<!-- HEADER -->
<app-header></app-header>

<main class="app-main">
  <!-- TABS -->
  <div class="tabs">
    <button
      class="tab-btn"
      [class.active]="activeTab === 'explain'"
      (click)="activeTab = 'explain'"
    >
      ⚡ Explain Code
    </button>
    <button
      class="tab-btn"
      [class.active]="activeTab === 'history'"
      (click)="activeTab = 'history'"
    >
      📚 History
      @if (historyCount() > 0) {
        <span class="tab-count">({{ historyCount() }})</span>
      }
    </button>
  </div>

  <!-- EXPLAIN TAB -->
  @if (activeTab === 'explain') {
    <app-code-editor
      [isLoading]="isLoading"
      (explainRequested)="onExplainRequested($event)"
    ></app-code-editor>

    <!-- RESULT CARDS -->
    <div id="results" class="results-area">
      @for (entry of results; track $index) {
        <app-result-card
          [entry]="entry"
          [index]="results.length - $index"
          [options]="entry.options!"
          (dismiss)="onDismiss($event)"
        ></app-result-card>
      }
    </div>
  }

  @if (activeTab === 'history') {
    <app-history-panel></app-history-panel>
  }
</main>
